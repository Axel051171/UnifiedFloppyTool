# Golden-Reference disk catalog — Hardware-in-the-Loop (P3.4)
#
# This catalog has TWO tiers:
#
#   software_reference  — the CI-runnable golden tier. Deterministic
#                         synthetic disk images, byte-exact verified
#                         against Greaseweazle, run by GitHub Actions
#                         on every push. No hardware needed. (#109)
#   disks               — the HARDWARE golden tier. Physical reference
#                         disks Axel keeps for HIL verification. The
#                         disks themselves cannot live in git — only
#                         their metadata and the SHA-256 of the baseline
#                         artefact each one produced on `main` @ MF-149
#                         (see tests/HARDWARE_TRUTH_TESTS.md
#                         "Pre-refactor baseline").
#
# run_hil.py reads the `disks` tier, drives the built `uft` binary
# against each `status: active` entry on the matching controller, and
# compares the result against the recorded `baseline_sha256`. Entries
# with `status: template` are skipped by the runner — they are
# documentation of the catalog structure, not a claim that the disk
# exists. Replace them with real entries (status: active) as the
# Golden-Reference set is assembled.
#
# Forensic honesty: never invent a baseline_sha256. If the baseline was
# not captured, leave it null and set status: pending — the runner will
# report NOT_RUN for that disk, never a false PASS.

catalog_version: 2

# The frozen Greaseweazle version the corpus + baselines were taken
# against. Must match tests/gw_corpus/outputs_gw/<ver>/ and the
# software_reference tier below.
gw_reference_version: "1.23"

# ─────────────────────────────────────────────────────────────────────
# Tier 1 — SOFTWARE golden reference (CI-runnable, no hardware)
#
# The P3.2 differential corpus IS a golden-reference catalog: six
# deterministic synthetic disk images, each decoded by BOTH the UFT
# flux engine and `gw convert` and asserted byte-identical. It runs in
# GitHub Actions on every push — the hardware tier below cannot. The
# committed sources are hash-manifested; the .scp flux streams are a
# regenerable build artefact (gitignored).
# ─────────────────────────────────────────────────────────────────────
software_reference:
  corpus_dir: tests/differential/corpus
  manifest: tests/differential/corpus/MANIFEST.sha256   # frozen source hashes
  generator: tests/differential/gen_corpus.py
  harness: tests/differential/test_gw_parity.py
  decoder_fixture: tests/differential/uft_flux_decode.c
  status: active            # all six classes byte-exact vs gw 1.23
  disk_classes:
    - { id: ibm_dd,     gw_format: ibm.720,             encoding: mfm }
    - { id: ibm_hd,     gw_format: ibm.1440,            encoding: mfm }
    - { id: atarist_dd, gw_format: atarist.720,         encoding: mfm }
    - { id: c64_gcr,    gw_format: commodore.1541,      encoding: gcr_c64 }
    - { id: apple2_525, gw_format: apple2.appledos.140, encoding: gcr_apple }
    - { id: amiga_dd,   gw_format: amiga.amigados,      encoding: amiga }

# ─────────────────────────────────────────────────────────────────────
# Tier 1.5 — SIMULATED HARDWARE (V415-PLAN MF-267, no real device)
#
# When the hardware tier (below) is `status: template` because no
# physical disks are catalogued yet, tools/hw_simulators/ provides
# Python fake-binary stand-ins for the QProcess-based controllers
# (KryoFlux DTC, FluxEngine, FC5025 fcimage). They consume the
# software-reference corpus above and emit the exact byte-format each
# real binary produces.
#
# Run with: python tests/hil/run_simulated.py --out releases/<ver>/hil_sim.md
# Results carry status `SIMULATED` — strictly between NOT_RUN (no info)
# and PASS (real-hardware-verified). Tier 1.5 catches argv / IO-glue
# bugs but does NOT cover timing, USB stack, signal integrity, or
# VID/PID disambiguation. See tools/hw_simulators/README.md.
# ─────────────────────────────────────────────────────────────────────
simulated_hardware:
  driver: tests/hil/run_simulated.py
  simulator_dir: tools/hw_simulators
  doc: tools/hw_simulators/README.md
  status: active        # the simulator system is wired and CI-runnable
  controllers_covered:
    - kryoflux
    - fluxengine
    - fc5025
  controllers_not_covered:
    - greaseweazle    # C-HAL with custom USB protocol, no subprocess seam
    - scp             # libusb-direct; needs USB-mock framework (v4.1.6)
    - xum1541         # libusb-direct; same
    - applesauce      # serial-direct; covered by tools/applesauce_sim.py
    - adfcopy         # serial-direct; same pattern, simulator NYI
    - usbfloppy       # UFI SG_IO C-HAL; SG_IO mock needed

# ─────────────────────────────────────────────────────────────────────
# Tier 2 — HARDWARE golden reference (Axel's rig, manual, per release)
#
# One template entry per HAL controller, so the catalog STRUCTURE is
# complete and ready to fill. Every shipped entry is `status: template`
# — replace it with a real `status: active` disk + captured baseline as
# the physical Golden-Reference set is assembled.
# ─────────────────────────────────────────────────────────────────────
disks:
  - id: TEMPLATE-gw-ibm-360k
    status: template            # template | pending | active
    controller: greaseweazle    # greaseweazle | scp | kryoflux | fluxengine
                                # | fc5025 | xum1541 | applesauce | adfcopy | usbfloppy
    media: "5.25\" DD"
    description: "IBM PC DOS 3.3 boot disk, 360 KB, 40 trk SS"
    photo: photos/TEMPLATE-gw-ibm-360k.jpg   # relative to tests/hil/
    # Baseline artefact captured on `main` @ MF-149. null until captured.
    baseline_artifact: null     # e.g. tests/baseline_artifacts/gw_ibm360k.scp
    baseline_sha256: null       # e.g. "a1b2c3..." — null = not captured yet
    # Read parameters the runner passes to `uft read`.
    read_args:
      tracks: "0-39"
      revs: 3
      image_ext: scp
    # Known forensic landmarks — documented so a HIL run can confirm
    # they are still observed, not silently smoothed away.
    known_marginal_tracks: []   # e.g. [39, 40]
    known_protection: null      # e.g. "long-track on track 0"
    # RPM baseline for `uft rpm` (±0.5 tolerance per HARDWARE_TRUTH_TESTS).
    baseline_rpm: null          # e.g. 300.0

  - id: TEMPLATE-scp-amiga-880k
    status: template
    controller: scp
    media: "3.5\" DD"
    description: "AmigaDOS 880 KB disk, known ADF content"
    photo: photos/TEMPLATE-scp-amiga-880k.jpg
    baseline_artifact: null
    baseline_sha256: null
    read_args:
      tracks: "0-79"
      revs: 3
      image_ext: scp
    known_marginal_tracks: []
    known_protection: null
    baseline_rpm: null          # Amiga DD nominal 300

  - id: TEMPLATE-kryoflux-atarist-720k
    status: template
    controller: kryoflux        # read-only (via DTC subprocess)
    media: "3.5\" DD"
    description: "Atari ST 720 KB disk, known ST content"
    photo: photos/TEMPLATE-kryoflux-atarist-720k.jpg
    baseline_artifact: null
    baseline_sha256: null
    read_args:
      tracks: "0-79"
      revs: 3
      image_ext: raw            # KryoFlux stream
    known_marginal_tracks: []
    known_protection: null
    baseline_rpm: null

  - id: TEMPLATE-fluxengine-apple2-140k
    status: template
    controller: fluxengine
    media: "5.25\" SS"
    description: "Apple II DOS 3.3 disk, 140 KB, 35 trk"
    photo: photos/TEMPLATE-fluxengine-apple2-140k.jpg
    baseline_artifact: null
    baseline_sha256: null
    read_args:
      tracks: "0-34"
      revs: 3
      image_ext: scp
    known_marginal_tracks: []
    known_protection: null
    baseline_rpm: null

  - id: TEMPLATE-fc5025-ibm-360k
    status: template
    controller: fc5025          # read-only, sector-level (no flux)
    media: "5.25\" DD"
    description: "IBM PC 360 KB disk — FC5025 reads sectors only"
    photo: photos/TEMPLATE-fc5025-ibm-360k.jpg
    baseline_artifact: null
    baseline_sha256: null
    read_args:
      tracks: "0-39"
      revs: 1                   # FC5025 is sector-level, single read
      image_ext: img
    known_marginal_tracks: []
    known_protection: null
    baseline_rpm: null

  - id: TEMPLATE-xum1541-1541-d64
    status: template
    controller: xum1541
    media: "5.25\" DD"
    description: "Commodore 1541-formatted disk, known D64 content"
    photo: photos/TEMPLATE-xum1541-1541-d64.jpg
    baseline_artifact: null
    baseline_sha256: null
    read_args:
      tracks: "1-35"
      revs: 1
      image_ext: d64
    known_marginal_tracks: []
    known_protection: null
    baseline_rpm: null

  - id: TEMPLATE-applesauce-apple2-protected
    status: template
    controller: applesauce
    media: "5.25\" SS"
    description: "Apple II copy-protected disk, known WOZ content"
    photo: photos/TEMPLATE-applesauce-apple2-protected.jpg
    baseline_artifact: null
    baseline_sha256: null
    read_args:
      tracks: "0-39"
      revs: 3
      image_ext: woz
    known_marginal_tracks: []
    known_protection: "documented scheme — fill in when disk is chosen"
    baseline_rpm: null

  - id: TEMPLATE-adfcopy-amiga-880k
    status: template
    controller: adfcopy
    media: "3.5\" DD"
    description: "AmigaDOS 880 KB disk, known ADF content"
    photo: photos/TEMPLATE-adfcopy-amiga-880k.jpg
    baseline_artifact: null
    baseline_sha256: null
    read_args:
      tracks: "0-79"
      revs: 1
      image_ext: adf
    known_marginal_tracks: []
    known_protection: null
    baseline_rpm: null

  - id: TEMPLATE-usbfloppy-pc-1440k
    status: template
    controller: usbfloppy       # sector-level USB floppy drive
    media: "3.5\" HD"
    description: "IBM PC 1.44 MB disk, known IMG content"
    photo: photos/TEMPLATE-usbfloppy-pc-1440k.jpg
    baseline_artifact: null
    baseline_sha256: null
    read_args:
      tracks: "0-79"
      revs: 1
      image_ext: img
    known_marginal_tracks: []
    known_protection: null
    baseline_rpm: null
