# ============================================================================
# UnifiedFloppyTool - Sanitizer Checks
#
# Runs ASan and UBSan builds to catch memory errors and undefined behaviour.
# Uses the CMake build path (library targets + test suite).
# ============================================================================

name: Sanitizer Checks

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

env:
  QT_VERSION: '6.7.3'

jobs:

  asan:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          modules: 'qtserialport'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libgl1-mesa-dev

      - name: Build with ASan (CMake)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DUFT_BUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
          cmake --build build --parallel $(nproc)

      - name: Run tests with ASan
        run: |
          cd build
          ctest --output-on-failure --timeout 300
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1

  ubsan:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          modules: 'qtserialport'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libgl1-mesa-dev

      - name: Build with UBSan (CMake)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DUFT_BUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="-fsanitize=undefined -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=undefined"
          cmake --build build --parallel $(nproc)

      - name: Run tests with UBSan
        run: |
          cd build
          ctest --output-on-failure --timeout 300
        env:
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
