# ============================================================================
# UnifiedFloppyTool - Code Coverage
#
# Builds with gcov instrumentation, runs the test suite, and uploads
# an lcov report to Codecov.
# Uses the CMake build path (library targets + test suite).
# ============================================================================

name: Code Coverage

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

env:
  QT_VERSION: '6.7.3'

jobs:

  coverage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          modules: 'qtserialport'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libgl1-mesa-dev lcov gcovr

      - name: Build with coverage (CMake)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DUFT_BUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          cmake --build build --parallel $(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure --timeout 120

      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info \
            --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/Qt/*' \
            --output-file coverage.info
          lcov --list coverage.info

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
