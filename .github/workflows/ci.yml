# ============================================================================
# UnifiedFloppyTool - CI Build
#
# Triggers on: pull requests, pushes to main
# Fixes applied:
#   FAILURE-001: macos-14 arch mismatch → removed clang_64, auto-detect
#   FAILURE-002: IQTA_TOOLS MinGW → add-tools-to-path: true
#   FAILURE-007: cmake --target all → removed, use default target
# ============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  QT_VERSION: '6.10.0'

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  build-linux:
  # ══════════════════════════════════════════════════════════════════════════
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache Qt
        uses: actions/cache@v4
        id: cache-qt-linux
        with:
          path: ~/Qt
          key: qt-linux-${{ env.QT_VERSION }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          modules: 'qtserialport'
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libusb-1.0-0-dev libgl1-mesa-dev

      - name: Build (qmake)
        run: |
          mkdir build && cd build
          qmake ../UnifiedFloppyTool.pro CONFIG+=release
          make -j$(nproc)

      - name: Smoke test
        run: |
          file build/UnifiedFloppyTool
          ldd build/UnifiedFloppyTool | grep -v "not found" || true

      - name: Build tests (CMake)
        # FIX-007: removed --target all (invalid on some generators)
        run: |
          cmake -B build-tests \
            -DCMAKE_BUILD_TYPE=Release \
            -DUFT_BUILD_TESTS=ON
          cmake --build build-tests --parallel $(nproc)

      - name: Run tests
        run: |
          cd build-tests
          ctest --output-on-failure --timeout 120

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-logs-${{ github.sha }}
          path: |
            build/*.log
            build-tests/CMakeFiles/*.log
          retention-days: 3

  # ══════════════════════════════════════════════════════════════════════════
  build-macos:
  # ══════════════════════════════════════════════════════════════════════════
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        # FIX-001: removed arch: clang_64 — macos-14 is ARM64, auto-detect
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          modules: 'qtserialport'
          cache: true

      - name: Build (qmake)
        run: |
          mkdir build && cd build
          qmake ../UnifiedFloppyTool.pro CONFIG+=release
          make -j$(sysctl -n hw.ncpu)

      - name: Smoke test
        run: |
          file build/UnifiedFloppyTool.app/Contents/MacOS/UnifiedFloppyTool

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-logs-${{ github.sha }}
          path: build/*.log
          retention-days: 3

  # ══════════════════════════════════════════════════════════════════════════
  build-windows:
  # ══════════════════════════════════════════════════════════════════════════
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt + MinGW
        # FIX-002: add-tools-to-path: true → MinGW auto in PATH, no IQTA_TOOLS needed
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_mingw
          modules: 'qtserialport'
          tools: 'tools_mingw1310'
          add-tools-to-path: true
          cache: true

      - name: Verify toolchain
        shell: bash
        run: |
          which mingw32-make || (echo "ERROR: mingw32-make not found" && exit 1)
          which qmake        || (echo "ERROR: qmake not found"        && exit 1)
          mingw32-make --version
          qmake --version

      - name: Build (qmake + MinGW)
        shell: bash
        run: |
          mkdir build && cd build
          qmake ../UnifiedFloppyTool.pro CONFIG+=release
          mingw32-make -j$(nproc)

      - name: Smoke test
        shell: bash
        run: |
          file build/release/UnifiedFloppyTool.exe

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-logs-${{ github.sha }}
          path: build/*.log
          retention-days: 3
